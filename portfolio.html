<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificates - Portfolio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Boxicons -->
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }

    h2 {
      text-align: center;
      margin: 40px 0;
      font-weight: bold;
    }

    .portfolio-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .portfolio-wrap img {
      width: 100%;
      transition: 0.4s;
    }

    .portfolio-wrap:hover img {
      transform: scale(1.1);
    }

    .portfolio-info {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      text-align: center;
      opacity: 0;
      transition: 0.3s;
    }

    .portfolio-wrap:hover .portfolio-info {
      opacity: 1;
    }

    .portfolio-links a {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      background: #00bcd4;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      text-decoration: none;
    }

    .portfolio-links a:hover {
      background: #0097a7;
    }
  </style>
</head>

<body>

  <h2>My Certificates</h2>

  <div class="container">
    <div class="row" data-aos="fade-up">

      <!-- COLOMBIA -->
      <div class="col-lg-4 col-md-6 mb-4">
        <div class="portfolio-wrap">
          <img src="assets/img/portfolio/COLOMBIA.jpeg" alt="Colombia Certificate">

          <div class="portfolio-info">
            <h5>Colombia Certificate</h5>
            <div class="portfolio-links">
              <a href="assets/img/portfolio/COLOMBIA.jpeg" target="_blank">
                <i class="bx bx-show"></i> VIEW
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- CODE PULSE -->
      <div class="col-lg-4 col-md-6 mb-4">
        <div class="portfolio-wrap">
          <img src="assets/img/portfolio/CODE PULSE.jpeg" alt="Code Pulse Certificate">

          <div class="portfolio-info">
            <h5>Code Pulse Certificate</h5>
            <div class="portfolio-links">
              <a href="assets/img/portfolio/CODE PULSE.jpeg" target="_blank">
                <i class="bx bx-show"></i> VIEW
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- POSTMAN -->
      <div class="col-lg-4 col-md-6 mb-4">
        <div class="portfolio-wrap">
          <img src="assets/img/portfolio/postman.jpeg" alt="Postman Certificate">

          <div class="portfolio-info">
            <h5>Postman Certificate</h5>
            <div class="portfolio-links">
              <a href="assets/img/portfolio/postman.jpeg" target="_blank">
                <i class="bx bx-show"></i> VIEW
              </a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
